# GPT / OpenRouter API Configuration
gpt:
  enabled: true
  # Leave api_key null so it is taken from OPENAI_API_KEY or OPENROUTER_API_KEY
  api_key: 1234
  # Use the OpenRouter model you specified
  # model_name: "openai/gpt-oss-120b"
  model_name: "Qwen/Qwen3-8B"
  # Point the OpenAI-compatible client to OpenRouter
  base_url: "http://localhost:7999/"
  timeout: 300
  
  # Default sampling parameters
  temperature: 0.7
  top_p: 0.95
  max_tokens: 16384
  presence_penalty: 0.0

# LLM Service Assignment
# Each pipeline component can independently specify the LLM service to use (vllm / gpt or future extended other services)
# Correspondance: Insight Miner, Result Analyzer, Reviewer, Related Work Searcher, Refiner
llm_assignments:
  # Insight Miner - Mining the core contributions and method insights of the paper
  insight_miner: "vllm_oss"

  # Result Analyzer - Analyzing the experimental results of the paper
  results_analyzer: "vllm_oss"

  # Reviewer - Generating the initial draft review
  reviewer: "vllm_deepreviewer"

  # Related Work Searcher - Using the following two sub-modules:
  #   keyword_generator: Generating the search keywords
  #   paper_summarizer: Summarizing the related papers retrieved
  keyword_generator: "vllm_oss"
  paper_summarizer: "vllm_oss"

  # Refiner - Refining the review based on the external tool information (fallback to reviewer if not configured)
  refiner: "vllm_oss"
